<div class="login-container">
  <div class="login-card">
    <h1>🛒 Indian Grocery Store</h1>
    <p class="subtitle">Welcome Back!</p>

    <div *ngIf="errorMessage()" class="alert alert-danger" role="alert">
      {{ errorMessage() }}
    </div>

    <div *ngIf="successMessage()" class="alert alert-success" role="alert">
      {{ successMessage() }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="emailId">Email Address</label>
        <input
          type="email"
          id="emailId"
          formControlName="emailId"
          placeholder="Enter your email address"
          class="form-control"
        />
        <div class="error-message" *ngIf="loginForm.get('emailId')?.invalid && loginForm.get('emailId')?.touched">
          <span *ngIf="loginForm.get('emailId')?.errors?.['required']">Email is required</span>
          <span *ngIf="loginForm.get('emailId')?.errors?.['email']">Please enter a valid email</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="Enter your password (min 6 characters)"
          class="form-control"
        />
        <div class="error-message" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          <span *ngIf="loginForm.get('password')?.errors?.['required']">Password is required</span>
          <span *ngIf="loginForm.get('password')?.errors?.['minlength']">Password must be at least 6 characters</span>
        </div>
      </div>

      <button type="submit" class="submit-btn" [disabled]="!loginForm.valid || isLoading()">
        <span *ngIf="!isLoading()">LOGIN</span>
        <span *ngIf="isLoading()">Logging In...</span>
      </button>
    </form>

    <div class="signup-link">
      <p>New customer? <a routerLink="/signup" class="link">Create an account</a></p>
    </div>
  </div>
</div>
