<div class="signup-container">
  <div class="signup-card">
    <h1>🌾 Create Your Account</h1>
    <p class="subtitle">Join Our Indian Grocery Community</p>

    <div *ngIf="errorMessage()" class="alert alert-danger" role="alert">
      {{ errorMessage() }}
    </div>

    <div *ngIf="successMessage()" class="alert alert-success" role="alert">
      {{ successMessage() }}
    </div>

    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="emailId">Email Address</label>
        <input
          type="email"
          id="emailId"
          formControlName="emailId"
          placeholder="Enter your email address"
          class="form-control"
        />
        <div class="error-message" *ngIf="signupForm.get('emailId')?.invalid && signupForm.get('emailId')?.touched">
          <span *ngIf="signupForm.get('emailId')?.errors?.['required']">Email is required</span>
          <span *ngIf="signupForm.get('emailId')?.errors?.['email']">Please enter a valid email</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="Create a strong password (min 6 characters)"
          class="form-control"
        />
        <div class="error-message" *ngIf="signupForm.get('password')?.invalid && signupForm.get('password')?.touched">
          <span *ngIf="signupForm.get('password')?.errors?.['required']">Password is required</span>
          <span *ngIf="signupForm.get('password')?.errors?.['minlength']">Password must be at least 6 characters</span>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input
          type="password"
          id="confirmPassword"
          formControlName="confirmPassword"
          placeholder="Re-enter your password"
          class="form-control"
        />
        <div class="error-message" *ngIf="signupForm.get('confirmPassword')?.invalid && signupForm.get('confirmPassword')?.touched">
          <span *ngIf="signupForm.get('confirmPassword')?.errors?.['required']">Please confirm your password</span>
        </div>
        <div class="error-message" *ngIf="signupForm.hasError('mismatch') && signupForm.get('confirmPassword')?.touched">
          Passwords do not match
        </div>
      </div>

      <button type="submit" class="submit-btn" [disabled]="!signupForm.valid || isLoading()">
        <span *ngIf="!isLoading()">CREATE ACCOUNT</span>
        <span *ngIf="isLoading()">Creating Account...</span>
      </button>
    </form>

    <div class="login-link">
      <p>Already have an account? <a (click)="navigateToLogin()" class="link">Login here</a></p>
    </div>
  </div>
</div>
